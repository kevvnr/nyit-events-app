name: campus_app
description: "NYIT Campus Events — Old Westbury"
publish_to: 'none'

# Marketing version = before +. Build = after + (CFBundleVersion / Android versionCode).
# Bump ONLY the build (+1, +2, …) until you want a new public version (e.g. 1.7.0+1).
# SideStore / TestFlight: each install must have a higher build than what’s on the phone.
# Signed:   make ipa → build/ios/ipa/CampusApp.ipa
# Unsigned: make ipa-unsigned → build/ios/ipa/CampusApp_unsigned.ipa
# SideStore: make sidestore-help  (full upload steps)
version: 1.6.0+8

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  uuid: ^4.5.3
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  add_2_calendar: ^3.0.1
  image_picker: ^1.2.1
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_remote_config: ^6.3.0
  package_info_plus: ^8.0.3
  url_launcher: ^6.3.1
  geolocator: ^14.0.2
  map_launcher: ^4.4.2
  flutter_polyline_points: ^3.1.0
  http: ^1.6.0
  in_app_review: ^2.0.10
  shared_preferences: ^2.5.3
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/nyit_logo.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/