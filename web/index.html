<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NYIT Campus Events dashboard and mobile app.">
  <meta name="theme-color" content="#1565C0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NYIT Events">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NYIT Events</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #0f4fa8 0%, #1565c0 50%, #1e88e5 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .boot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #ffffff;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      margin-bottom: 14px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.86);
      margin-bottom: 18px;
    }
    .loader {
      width: 180px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: #ffffff;
      border-radius: 999px;
      animation: slide 1.2s infinite ease-in-out;
    }
    @keyframes slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="boot" id="boot">
    <div class="logo">🎓</div>
    <div class="title">NYIT Events</div>
    <div class="subtitle">Loading dashboard experience...</div>
    <div class="loader"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('boot');
      if (boot) boot.remove();
    });
  </script>
</body>
</html>
